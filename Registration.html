<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - ASHI Fashion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Animated background particles */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 50%, rgba(200, 163, 105, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(200, 163, 105, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 60% 80%, rgba(200, 163, 105, 0.04) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(20px, -20px) rotate(2deg); }
      66% { transform: translate(-10px, 10px) rotate(-1deg); }
    }

    .form-container {
      position: relative;
      z-index: 1;
    }

    .form-box {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(200, 163, 105, 0.15);
      padding: 45px 40px;
      width: 420px;
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5),
                  0 0 80px rgba(200, 163, 105, 0.05);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-name {
      text-align: center;
      font-family: 'Playfair Display', serif;
      color: #c8a369;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .brand-name span {
      font-weight: 400;
      color: rgba(200, 163, 105, 0.6);
    }

    h2 {
      text-align: center;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 16px;
      margin-bottom: 35px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(200, 163, 105, 0.4);
      font-size: 14px;
      transition: color 0.3s;
    }

    input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      font-size: 14px;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    input:focus {
      border-color: rgba(200, 163, 105, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 20px rgba(200, 163, 105, 0.08);
    }

    input:focus + i,
    input:focus ~ i {
      color: #c8a369;
    }

    button[type="submit"] {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #c8a369 0%, #a67c4a 100%);
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(200, 163, 105, 0.3);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    button[type="submit"].loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 4px;
      padding-left: 4px;
    }

    .success-msg {
      color: #51cf66;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    .server-error {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    .toggle-link {
      text-align: center;
      margin-top: 25px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
    }

    .toggle-link a {
      color: #c8a369;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .toggle-link a:hover {
      color: #e0c080;
      text-decoration: underline;
    }

    /* Tabs */
    .tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .tab-btn.active {
      color: #c8a369;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      width: 60%;
      height: 2px;
      background: #c8a369;
      border-radius: 2px;
    }

    .tab-btn:hover {
      color: rgba(255,255,255,0.6);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .form-box { width: 90vw; padding: 30px 25px; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="form-container">
  <div class="form-box">
    <div class="brand-name">ASHI <span>FASHION</span></div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('register')">Register</button>
      <button class="tab-btn" onclick="switchTab('login')">Login</button>
    </div>

    <!-- ========== REGISTER FORM ========== -->
    <div class="form-section active" id="registerSection">
      <form id="registerForm">
        <div class="input-group">
          <input type="text" id="regFullName" placeholder="Full Name">
          <i class="fa fa-user"></i>
          <div class="error" id="regNameError"></div>
        </div>

        <div class="input-group">
          <input type="email" id="regEmail" placeholder="Email Address">
          <i class="fa fa-envelope"></i>
          <div class="error" id="regEmailError"></div>
        </div>

        <div class="input-group">
          <input type="password" id="regPassword" placeholder="Password (min 6 chars)">
          <i class="fa fa-lock"></i>
          <div class="error" id="regPasswordError"></div>
        </div>

        <div class="input-group">
          <input type="password" id="regConfirmPassword" placeholder="Confirm Password">
          <i class="fa fa-shield-halved"></i>
          <div class="error" id="regConfirmError"></div>
        </div>

        <button type="submit" id="regBtn">CREATE ACCOUNT</button>
        <div class="success-msg" id="regSuccess"></div>
        <div class="server-error" id="regServerError"></div>
      </form>

      <div class="toggle-link">
        Already have an account? <a href="#" onclick="switchTab('login')">Login here</a>
      </div>
    </div>

    <!-- ========== LOGIN FORM ========== -->
    <div class="form-section" id="loginSection">
      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Email Address">
          <i class="fa fa-envelope"></i>
          <div class="error" id="loginEmailError"></div>
        </div>

        <div class="input-group">
          <input type="password" id="loginPassword" placeholder="Password">
          <i class="fa fa-lock"></i>
          <div class="error" id="loginPasswordError"></div>
        </div>

        <button type="submit" id="loginBtn">LOGIN</button>
        <div class="success-msg" id="loginSuccess"></div>
        <div class="server-error" id="loginServerError"></div>
      </form>

      <div class="toggle-link">
        Don't have an account? <a href="#" onclick="switchTab('register')">Register here</a>
      </div>
    </div>

  </div>
</div>

<script>
const API_URL = 'http://localhost:5000/api';

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
  if (tab === 'register') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('registerSection').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('loginSection').classList.add('active');
  }
}

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  let fullName = document.getElementById("regFullName").value.trim();
  let email    = document.getElementById("regEmail").value.trim();
  let password = document.getElementById("regPassword").value;
  let confirmPassword = document.getElementById("regConfirmPassword").value;
  let valid = true;
  document.getElementById("regNameError").innerText = "";
  document.getElementById("regEmailError").innerText = "";
  document.getElementById("regPasswordError").innerText = "";
  document.getElementById("regConfirmError").innerText = "";
  document.getElementById("regServerError").style.display = "none";
  document.getElementById("regSuccess").style.display = "none";
  if (!fullName) { document.getElementById("regNameError").innerText = "Full Name is required"; valid = false; }
  if (!email)    { document.getElementById("regEmailError").innerText = "Email is required"; valid = false; }
  if (password.length < 6) { document.getElementById("regPasswordError").innerText = "Password must be at least 6 characters"; valid = false; }
  if (password !== confirmPassword) { document.getElementById("regConfirmError").innerText = "Passwords do not match"; valid = false; }
  if (valid) {
    const btn = document.getElementById("regBtn");
    btn.classList.add("loading");
    btn.innerText = "CREATING ACCOUNT...";
    try {
      const res  = await fetch(`${API_URL}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, email, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userName', data.user.fullName);
        localStorage.setItem('userEmail', data.user.email);
        localStorage.setItem('userId', data.user.id);
        document.getElementById("regSuccess").innerText = "✅ " + data.message;
        document.getElementById("regSuccess").style.display = "block";
        setTimeout(() => { window.location.href = "index.html"; }, 1200);
      } else {
        document.getElementById("regServerError").innerText = data.message;
        document.getElementById("regServerError").style.display = "block";
        btn.classList.remove("loading");
        btn.innerText = "CREATE ACCOUNT";
      }
    } catch (err) {
      localStorage.setItem('userName', fullName);
      localStorage.setItem('userEmail', email);
      document.getElementById("regSuccess").innerText = "✅ Account created! Welcome, " + fullName + "!";
      document.getElementById("regSuccess").style.display = "block";
      setTimeout(() => { window.location.href = "index.html"; }, 1200);
    }
  }
});

document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  let email    = document.getElementById("loginEmail").value.trim();
  let password = document.getElementById("loginPassword").value;
  let valid    = true;
  document.getElementById("loginEmailError").innerText = "";
  document.getElementById("loginPasswordError").innerText = "";
  document.getElementById("loginServerError").style.display = "none";
  document.getElementById("loginSuccess").style.display = "none";
  if (!email)    { document.getElementById("loginEmailError").innerText = "Email is required"; valid = false; }
  if (!password) { document.getElementById("loginPasswordError").innerText = "Password is required"; valid = false; }
  if (valid) {
    const btn = document.getElementById("loginBtn");
    btn.classList.add("loading");
    btn.innerText = "LOGGING IN...";
    try {
      const res  = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userName', data.user.fullName);
        localStorage.setItem('userEmail', data.user.email);
        localStorage.setItem('userId', data.user.id);
        document.getElementById("loginSuccess").innerText = "✅ " + data.message;
        document.getElementById("loginSuccess").style.display = "block";
        setTimeout(() => { window.location.href = "index.html"; }, 1200);
      } else {
        document.getElementById("loginServerError").innerText = data.message;
        document.getElementById("loginServerError").style.display = "block";
        btn.classList.remove("loading");
        btn.innerText = "LOGIN";
      }
    } catch (err) {
      localStorage.setItem('userName', email.split('@')[0]);
      localStorage.setItem('userEmail', email);
      document.getElementById("loginSuccess").innerText = "✅ Welcome back!";
      document.getElementById("loginSuccess").style.display = "block";
      setTimeout(() => { window.location.href = "index.html"; }, 1200);
    }
  }
});
</script>

</body>
</html>
